services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./hm.runtime.env
    environment:
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
      POSTGRES_USER: grok2api
      POSTGRES_DB: grok2api
    volumes:
      - grok2api_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grok2api -d grok2api"]
      interval: 5s
      timeout: 5s
      retries: 10

  console:
    build:
      context: .
      dockerfile: apps/worker-runtime/Dockerfile
    image: grok2apiwarp-auto-console:latest
    container_name: grok2apiwarp-auto-console-1
    env_file:
      - ./hm.runtime.env
    environment:
      GROK_REGISTER_SOURCE_DIR: /workspace
      GROK_REGISTER_PYTHON: /usr/local/bin/python
      GROK_REGISTER_CONSOLE_HOST: 0.0.0.0
      GROK_REGISTER_CONSOLE_PORT: ${GROK_STACK_CONSOLE_PORT:-18600}
      GROK_REGISTER_CONSOLE_MAX_CONCURRENT_TASKS: 1
      GROK_REGISTER_DEFAULT_RUN_COUNT: ${GROK_REGISTER_DEFAULT_RUN_COUNT:-50}
      GROK_REGISTER_DEFAULT_PROXY: socks5://127.0.0.1:1081
      GROK_REGISTER_DEFAULT_BROWSER_PROXY: socks5://127.0.0.1:1081
      GROK2API_HOST: 127.0.0.1
      GROK2API_PORT: 3000
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${GROK_STACK_CONSOLE_PORT:-18600}:18600"
    volumes:
      - .:/workspace
      - /opt/grokcli-2api/data:/app/data
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - default
      - warp_proxy

volumes:
  grok2api_pg:
    external: true
    name: grokcli-2api_grok2api_pg

networks:
  warp_proxy:
    external: true
    name: warp-proxy_default
