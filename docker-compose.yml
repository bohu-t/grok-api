services:
  console:
    build:
      context: .
      dockerfile: apps/worker-runtime/Dockerfile
    image: grok2apiwarp-auto-console:latest
    container_name: grok2apiwarp-auto-console-1
    working_dir: /workspace
    command: python /workspace/apps/console/app.py
    environment:
      GROK_REGISTER_SOURCE_DIR: /workspace
      GROK_REGISTER_PYTHON: /usr/local/bin/python
      GROK_REGISTER_CONSOLE_HOST: 0.0.0.0
      GROK_REGISTER_CONSOLE_PORT: ${GROK_STACK_CONSOLE_PORT:-18600}
      GROK_REGISTER_CONSOLE_MAX_CONCURRENT_TASKS: 1
      GROK_REGISTER_DEFAULT_RUN_COUNT: ${GROK_REGISTER_DEFAULT_RUN_COUNT:-50}
      GROK_REGISTER_DEFAULT_PROXY: ${GROK_REGISTER_DEFAULT_PROXY:-socks5://127.0.0.1:1081}
      GROK_REGISTER_DEFAULT_BROWSER_PROXY: ${GROK_REGISTER_DEFAULT_BROWSER_PROXY:-socks5://127.0.0.1:1081}
      HM_ADMIN_PASSWORD: ${HM_ADMIN_PASSWORD:-}
    ports:
      - "${GROK_STACK_CONSOLE_PORT:-18600}:18600"
    volumes:
      - .:/workspace
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - grokcli

networks:
  grokcli:
    external: true
    name: grokcli-2api_default
